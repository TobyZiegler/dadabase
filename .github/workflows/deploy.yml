# ============================================================
#  Dad-a-Base — Automatic Deployment Workflow
#  Triggers on every push to the main branch.
#  Uploads all changed files to dadabase.tobyziegler.com via FTP.
# ============================================================

name: Deploy to Namecheap

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Upload via FTP
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the latest code from GitHub
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Needed to detect which files changed

      # Step 2: Deploy changed files to the server via FTP
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:          ${{ secrets.FTP_SERVER }}
          username:        ${{ secrets.FTP_USERNAME }}
          password:        ${{ secrets.FTP_PASSWORD }}
          protocol:        ftps
          port:            990
          local-dir:       ./
          server-dir:      /
          exclude:         |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/README.md
            **/.DS_Store
            **/setup.sql